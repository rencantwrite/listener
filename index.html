<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Reader</title>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --surface-color: #F4EFE6;
            --text-main: #2C2A25;
            --text-muted: #6B685F;
            --accent: #8C7B65;
            --accent-hover: #756550;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-reading: "Georgia", "Merriweather", serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 2rem;
            text-align: center;
        }

        header h1 {
            font-family: var(--font-reading);
            font-weight: normal;
            font-size: 2rem;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .controls {
            background-color: var(--surface-color);
            padding: 1.5rem;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="range"] {
            width: 100%;
            background: transparent;
        }

        select {
            padding: 0.5rem;
            border: 1px solid #D6CFC1;
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--accent);
        }

        .value-display {
            font-size: 0.8rem;
            float: right;
            color: var(--accent);
        }

        .playback-buttons {
            display: flex;
            gap: 1rem;
            grid-column: 1 / -1;
            justify-content: center;
            margin-top: 0.5rem;
        }

        button {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        button:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        button.primary {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        button.primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        textarea {
            width: 100%;
            height: 50vh;
            min-height: 300px;
            padding: 2rem;
            border: 1px solid #D6CFC1;
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-reading);
            font-size: 1.15rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: #A39E93;
            font-style: italic;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            height: 4px;
            background: #D6CFC1;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        input[type=range]:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Quiet Reader</h1>
    </header>

    <main>
        <div class="controls">
            <div class="control-group">
                <label for="voiceSelect">Voice</label>
                <select id="voiceSelect"></select>
            </div>
            <div class="control-group">
                <label for="rateInput">
                    Reading Speed <span class="value-display" id="rateValue">1.0</span>
                </label>
                <input type="range" id="rateInput" min="0.5" max="2" value="1" step="0.1">
            </div>
            <div class="control-group">
                <label for="pitchInput">
                    Voice Pitch <span class="value-display" id="pitchValue">1.0</span>
                </label>
                <input type="range" id="pitchInput" min="0.5" max="1.5" value="1" step="0.1">
            </div>

            <div class="playback-buttons">
                <button id="playBtn" class="primary">Play</button>
                <button id="pauseBtn">Pause</button>
                <button id="stopBtn">Stop</button>
            </div>
        </div>

        <textarea id="textInput" placeholder="Paste your chapter here. I'll read it continuously, automatically handling long text so it won't cut out..."></textarea>
    </main>

    <script>
        const synth = window.speechSynthesis;
        
        // DOM Elements
        const voiceSelect = document.getElementById('voiceSelect');
        const rateInput = document.getElementById('rateInput');
        const pitchInput = document.getElementById('pitchInput');
        const rateValue = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');
        const textInput = document.getElementById('textInput');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');

        // State for long text chunking
        let voices = [];
        let textChunks = [];
        let currentChunkIndex = 0;
        let isReading = false;

        // Initialize Voices
        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            // Prefer English voices for a cleaner default list, but include all
            const sortedVoices = voices.sort((a, b) => {
                if (a.lang.startsWith('en') && !b.lang.startsWith('en')) return -1;
                if (!a.lang.startsWith('en') && b.lang.startsWith('en')) return 1;
                return a.name.localeCompare(b.name);
            });

            sortedVoices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.voiceURI;
                voiceSelect.appendChild(option);
            });

            loadSettings();
        }

        // Chrome needs this event to load voices properly
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        // Save & Load Settings via LocalStorage
        function saveSettings() {
            const settings = {
                voiceURI: voiceSelect.value,
                rate: rateInput.value,
                pitch: pitchInput.value,
                text: textInput.value
            };
            localStorage.setItem('quietReaderSettings', JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem('quietReaderSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                if (settings.voiceURI) voiceSelect.value = settings.voiceURI;
                if (settings.rate) {
                    rateInput.value = settings.rate;
                    rateValue.textContent = settings.rate;
                }
                if (settings.pitch) {
                    pitchInput.value = settings.pitch;
                    pitchValue.textContent = settings.pitch;
                }
                if (settings.text && textInput.value === '') {
                    textInput.value = settings.text;
                }
            }
        }

        // Chunking Logic to prevent Chrome 15-second TTS timeout
        function startReading() {
            if (synth.paused) {
                synth.resume();
                isReading = true;
                return;
            }

            if (synth.speaking) return;

            const text = textInput.value;
            if (!text.trim()) return;

            // Split by double newline (paragraphs) or single newlines
            textChunks = text.split(/\n+/).filter(chunk => chunk.trim().length > 0);
            currentChunkIndex = 0;
            isReading = true;
            
            speakNextChunk();
        }

        function speakNextChunk() {
            if (currentChunkIndex >= textChunks.length) {
                isReading = false;
                return;
            }

            const chunk = textChunks[currentChunkIndex];
            const utterance = new SpeechSynthesisUtterance(chunk);
            
            // Apply settings
            const selectedVoice = voices.find(v => v.voiceURI === voiceSelect.value);
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.rate = parseFloat(rateInput.value);
            utterance.pitch = parseFloat(pitchInput.value);

            utterance.onend = () => {
                // Only proceed if we haven't hit stop
                if (isReading) {
                    currentChunkIndex++;
                    speakNextChunk();
                }
            };

            utterance.onerror = (e) => {
                console.warn('Speech synthesis error:', e);
                // Try to recover by moving to next chunk
                if (isReading && e.error !== 'canceled') {
                    currentChunkIndex++;
                    speakNextChunk();
                }
            };

            synth.speak(utterance);
        }

        function pauseReading() {
            if (synth.speaking) {
                synth.pause();
                isReading = false;
            }
        }

        function stopReading() {
            isReading = false;
            synth.cancel();
            currentChunkIndex = 0;
        }

        // Event Listeners
        rateInput.addEventListener('input', () => {
            rateValue.textContent = rateInput.value;
            saveSettings();
        });

        pitchInput.addEventListener('input', () => {
            pitchValue.textContent = pitchInput.value;
            saveSettings();
        });

        voiceSelect.addEventListener('change', () => {
            saveSettings();
            // If currently speaking, restart current chunk with new voice
            if (synth.speaking && !synth.paused) {
                synth.cancel();
                speakNextChunk();
            }
        });

        textInput.addEventListener('input', saveSettings);

        playBtn.addEventListener('click', startReading);
        pauseBtn.addEventListener('click', pauseReading);
        stopBtn.addEventListener('click', stopReading);

        // Initial setup for browsers that load voices immediately
        populateVoices();
    </script>
</body>
</html>
